<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>India Service Finder | Locate Nearby Essentials</title>

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header class="header-wrap">
        <div class="header-container">
            <div class="brand-wrapper">
                <img src="{{ url_for('static', filename='favicon.png') }}" class="app-logo">
                <h1 class="app-name">ProxiFind</h1>
            </div>
            <label class="switch">
                <input type="checkbox" id="theme-checkbox">
                <span class="slider"></span>
            </label>
        </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <main class="container main-content">

        <section class="search-box" aria-label="Search and Filters">
            <input id="place" type="text" placeholder="Enter location (e.g. Indrapuri, Bhopal)"
                aria-label="Location Search">

            <input id="radius" type="number" value="1" step="0.5" min="0.5" max="50" title="Search radius in km">

            <select id="category" aria-label="Select Category">
                <option value="All">All Categories</option>
                <option value="restaurant">🍔 Food & Dining</option>
                <option value="hospital">🏥 Medical / Hospital</option>
                <option value="atm">🏧 Bank / ATM</option>
                <option value="school">🏫 Education / School</option>
                <option value="gym">💪 Fitness / Gym</option>
            </select>

            <button class="btn-primary" onclick="search()">Search</button>
            <button class="btn-secondary" onclick="getLocation()">📍 My Location</button>
        </section>

        <div id="map" role="application" aria-label="Interactive Map"></div>

        <div id="results" aria-live="polite">
        </div>

    </main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
